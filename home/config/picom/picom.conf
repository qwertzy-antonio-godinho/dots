backend = "glx";

fading = false;

shadow = true;

shadow-exclude = [
	"class_g = 'Conky'",
	"_GTK_FRAME_EXTENTS@:c",
];

shadow-radius = 60;
shadow-opacity = 0.75;
shadow-offset-x = -40;
shadow-offset-y = -40;

inactive-dim = 0.2

vsync = true;

wintypes:
{
	tooltip = { fade = true; shadow = true; opacity = 0.90; focus = true; full-shadow = false; };
	dock = { shadow = false; clip-shadow-above = true; }
	dnd = { shadow = false; }
	menu = { shadow = false; };
	dropdown_menu = { shadow = false; };
	popup_menu    = { shadow = false; };
};


